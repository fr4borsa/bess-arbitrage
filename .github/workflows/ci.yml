name: ci

on:
  push:
    branches: [main]
  pull_request:

# a new push to the same branch cancels the run in progress — no queue of stale builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: ruff (lint)
        run: uv run ruff check .
      - name: pytest (LP invariants)
        run: uv run pytest -q
      - name: offline smoke checks
        run: |
          uv run python -m bess_arbitrage.model
          uv run python -m bess_arbitrage.capture
          uv run python -m bess_arbitrage.insights
          uv run python -m bess_arbitrage.atlas --demo
          uv run python -m bess_arbitrage.bench --demo
